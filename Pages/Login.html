<div class="h-full w-full flex items-center justify-center bg-gray-200 p-4 absolute inset-0 z-50">
  <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8 text-center border border-gray-100">
    
    <div class="mx-auto w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-md">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
    </div>
    
    <h2 id="login-app-name" class="text-2xl font-black text-gray-800 mb-2 tracking-tight">Task Manager</h2>
    <p class="text-sm text-gray-500 mb-8">Secure Operations Portal</p>

    <div id="login-state-container" class="min-h-[120px] flex flex-col items-center justify-center">
      <button onclick="window.Login.processLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg text-lg focus:outline-none">
        Log In to Portal
      </button>
      <p class="text-xs text-gray-400 mt-4 font-medium uppercase tracking-widest">Requires Google Authentication</p>
    </div>
    
  </div>
</div>

<script>
window.Login = {
  
  init() {
    const container = document.getElementById('login-state-container');
    container.innerHTML = `
      <button onclick="window.Login.processLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg text-lg focus:outline-none">
        Log In to Portal
      </button>
      <p class="text-xs text-gray-400 mt-4 font-medium uppercase tracking-widest">Requires Google Authentication</p>
    `;

    google.script.run
      .withSuccessHandler(res => {
        try {
          const response = JSON.parse(res);
          if (response.success && response.data && response.data.appName) {
            const customName = response.data.appName;
            document.getElementById('login-app-name').textContent = customName;
            document.title = customName; 
          }
        } catch(e) {
          console.error("Error loading app name:", e);
        }
      })
      .API_getAppSettings();
  },

  processLogin() {
    const container = document.getElementById('login-state-container');
    container.innerHTML = `
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      <p class="text-xs text-gray-400 mt-4 font-medium uppercase tracking-widest">Verifying Account & Starting Session...</p>
    `;

    google.script.run
      .withSuccessHandler(res => {
        const response = JSON.parse(res);
        if (response.success && response.authorized) {
          window.CurrentUser = response.user;
          this.bootDashboard();
        } else {
          container.innerHTML = `
            <div class="bg-red-50 text-red-800 p-3 rounded-lg text-sm w-full mb-5 border border-red-200">
              Access Denied:<br><span class="font-bold text-base mt-1 block">${response.email}</span>
            </div>
            
            <div id="request-form-area" class="text-left w-full">
              <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-2">Reason / Your Team Name</label>
              <textarea id="access-reason" rows="2" class="w-full text-sm border border-gray-200 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:outline-none focus:border-blue-500 transition-colors resize-none mb-3" placeholder="e.g., I am a new QA on the Alpha Team..."></textarea>
              
              <button id="btn-request-access" onclick="window.Login.submitAccessRequest()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-xl shadow-md transition-all focus:outline-none flex items-center justify-center gap-2 mb-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Request Access
              </button>
              <button onclick="window.Login.init()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 text-sm font-bold py-3 rounded-xl border border-gray-200 transition-colors focus:outline-none">Cancel / Retry</button>
            </div>

            <div id="request-success-area" class="hidden flex-col items-center w-full py-2">
              <div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center mb-3">
                <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <h3 class="text-lg font-black text-gray-900">Request Sent!</h3>
              <p class="text-xs text-gray-500 mt-2 font-medium">An administrator has been notified. Please check back later once access is granted.</p>
              <button onclick="window.Login.init()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 text-sm font-bold py-3 rounded-xl border border-gray-200 transition-colors mt-6 focus:outline-none">Return to Login</button>
            </div>
          `;
        }
      })
      .withFailureHandler(err => {
         if(typeof toastError === 'function') toastError(err.message);
         else alert(err.message);
         this.init();
      })
      .API_loginUser();
  },

  submitAccessRequest() {
    const btn = document.getElementById('btn-request-access');
    const reasonEl = document.getElementById('access-reason');
    const reason = reasonEl ? reasonEl.value.trim() : '';

    btn.disabled = true;
    btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div> <span class="ml-2">Sending...</span>`;
    btn.classList.add('opacity-75');

    google.script.run
      .withSuccessHandler(res => {
        const response = JSON.parse(res);
        if (response.success) {
          document.getElementById('request-form-area').classList.add('hidden');
          const successArea = document.getElementById('request-success-area');
          successArea.classList.remove('hidden');
          successArea.classList.add('flex');
        } else {
          if (typeof toastError === "function") toastError(response.message);
          else alert(response.message);
          this.resetRequestBtn(btn);
        }
      })
      .withFailureHandler(err => {
        if (typeof toastError === "function") toastError('Failed to send request: ' + err.message);
        else alert('Failed to send request: ' + err.message);
        this.resetRequestBtn(btn);
      })
      .API_requestAccess(reason);
  },

  resetRequestBtn(btn) {
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg> Request Access`;
    btn.classList.remove('opacity-75');
  },

  bootDashboard() {
    if (typeof window.enterApplication === 'function' && window.CurrentUser) {
      window.enterApplication(window.CurrentUser);
    }
  }
};
</script>
