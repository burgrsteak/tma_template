    background-position: right 0.75rem center;
    background-repeat: no-repeat;
    background-size: 1.25em 1.25em;
  }

<script>
window.TaskModal = {
  selectedAssignees: [],

  open() {
    this.populateDropdowns();
    this.resetForm(); 
    this.setupDropdownListener();
    document.getElementById('task-modal-overlay').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('task-modal-content').classList.remove('scale-95');
      document.getElementById('task-modal-content').classList.add('scale-100');
    }, 10);
  },

  close() {
    document.getElementById('task-modal-content').classList.remove('scale-100');
    document.getElementById('task-modal-content').classList.add('scale-95');
    setTimeout(() => { document.getElementById('task-modal-overlay').classList.add('hidden'); }, 150);
  },

  setupDropdownListener() {
    document.addEventListener('click', (e) => {
      const container = document.getElementById('tm-assignee-container');
      const dropdown = document.getElementById('tm-assignee-dropdown');
      if (container && dropdown && !container.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });
  },

  resetForm() {
    document.getElementById('modal-title').value = '';
    document.getElementById('modal-desc').value = '';
    document.getElementById('modal-deadline').value = ''; 
    document.getElementById('modal-category').value = '';
    
    const prioSelect = document.getElementById('modal-priority');
    if(prioSelect.options.length > 0) {
      let hasMedium = Array.from(prioSelect.options).some(o => o.value === 'Medium');
      prioSelect.value = hasMedium ? 'Medium' : prioSelect.options[0].value;
    }
    
    this.selectedAssignees = [];
    const searchInput = document.getElementById('tm-assignee-input');
    if (searchInput) searchInput.value = '';
    
    this.updateAssigneePills();
    if (typeof this.filterAssignees === 'function') this.filterAssignees('');
  },

  populateDropdowns() {
    if (!window.AppConfig) return;
    
    const dropdown = document.getElementById('tm-assignee-dropdown');
    if (dropdown && window.AppConfig.users) {
      dropdown.innerHTML = '';
      window.AppConfig.users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'tm-assignee-item flex items-center gap-3 p-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors';
        item.dataset.email = user.email;
        item.dataset.name = user.name;
        item.dataset.role = user.role || 'Agent';
        item.onclick = () => window.TaskModal.addAssignee(user.email, user.name, user.role);
        
        item.innerHTML = `
          <div class="flex flex-col pointer-events-none">
            <span class="text-xs font-bold text-gray-800">${user.name}</span>
            <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400">${user.role || 'Agent'}</span>
          </div>
        `;
        dropdown.appendChild(item);
      });
    }

    const prioritySelect = document.getElementById('modal-priority');
    prioritySelect.innerHTML = '';
    let keys = [];
    if (window.AppConfig.timers) keys = Object.keys(window.AppConfig.timers);
    if (!keys.includes('none')) keys.push('none');
    const order = ['high', 'medium', 'low', 'none'];
    keys.sort((a, b) => {
      let iA = order.indexOf(a.toLowerCase()); let iB = order.indexOf(b.toLowerCase());
      if (iA === -1) iA = 99; if (iB === -1) iB = 99;
      return iA - iB;
    });
    keys.forEach(k => {
      const capitalized = k.charAt(0).toUpperCase() + k.slice(1);
      prioritySelect.innerHTML += `<option value="${capitalized}">${capitalized}</option>`;
    });
  },

  filterAssignees(query) {
    const items = document.querySelectorAll('.tm-assignee-item');
    const lowerQuery = query.toLowerCase();
    let hasVisible = false;

    items.forEach(item => {
      const name = item.dataset.name.toLowerCase();
      const email = item.dataset.email.toLowerCase();
      const isSelected = this.selectedAssignees.some(a => a.email === item.dataset.email);
      
      if (!isSelected && (name.includes(lowerQuery) || email.includes(lowerQuery))) {
        item.style.display = 'flex';
        hasVisible = true;
      } else {
        item.style.display = 'none';
      }
    });

    const dropdown = document.getElementById('tm-assignee-dropdown');
    if (hasVisible) {
      dropdown.classList.remove('hidden');
    } else {
      dropdown.classList.add('hidden');
    }
  },

  addAssignee(email, name, role) {
    if (!this.selectedAssignees.some(a => a.email === email)) {
      this.selectedAssignees.push({ email, name, role });
      this.updateAssigneePills();
    }
    const input = document.getElementById('tm-assignee-input');
    input.value = '';
    input.focus();
    this.filterAssignees('');
  },

  removeAssignee(email) {
    this.selectedAssignees = this.selectedAssignees.filter(a => a.email !== email);
    this.updateAssigneePills();
    this.filterAssignees(document.getElementById('tm-assignee-input').value);
  },

  assignToMe() {
    if (!window.CurrentUser || !window.CurrentUser.email) {
      if (typeof toastError === "function") toastError("Could not verify your user session.");
      return;
    }
    
    this.selectedAssignees = [{
      email: window.CurrentUser.email,
      name: window.CurrentUser.name,
      role: window.CurrentUser.role || 'Agent'
    }];
    
    this.updateAssigneePills();
    this.filterAssignees('');
  },

  updateAssigneePills() {
    const pillsContainer = document.getElementById('tm-assignee-pills');
    const input = document.getElementById('tm-assignee-input');
    
    pillsContainer.innerHTML = '';
    
    if (this.selectedAssignees.length > 0) {
      input.placeholder = "Add more...";
      this.selectedAssignees.forEach(user => {
        const firstName = user.name.split(' ')[0];
        pillsContainer.innerHTML += `
          <span class="bg-blue-100 text-blue-800 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border border-blue-200 shadow-sm whitespace-nowrap flex items-center gap-1 cursor-default">
            ${firstName}
            <button type="button" onclick="event.stopPropagation(); window.TaskModal.removeAssignee('${user.email}')" class="hover:text-blue-900 focus:outline-none font-black text-xs ml-0.5">&times;</button>
          </span>
        `;
      });
    } else {
      input.placeholder = "Search names...";
    }
    
    this.handleAssigneeChange();
  },

  handleAssigneeChange() {
    const catInput = document.getElementById('modal-category');
    const catDataList = document.getElementById('category-options');
    const currentSelectedCategory = catInput.value; 

    let targetRole = null;
    if (this.selectedAssignees.length > 0) {
      targetRole = this.selectedAssignees[0].role;
    }

    catDataList.innerHTML = '';
    let validCategories = [];
    if (window.AppConfig && window.AppConfig.taskTypes) {
      window.AppConfig.taskTypes.forEach(type => {
        // FIX: If there are no restricted roles, it is available to everyone
        const isGlobalTask = !type.allowedRoles || type.allowedRoles.length === 0;
        const isUserAllowed = !targetRole || isGlobalTask || type.allowedRoles.includes(targetRole);

        if (isUserAllowed) {
          const opt = document.createElement('option'); 
          opt.value = type.label;
          catDataList.appendChild(opt); 
          validCategories.push(type.label);
        }
      });
    }
    let isCategoryStillValid = validCategories.includes(currentSelectedCategory);
    catInput.value = isCategoryStillValid ? currentSelectedCategory : '';
    this.handleCategoryChange();
  },

  handleCategoryChange() {
    const selectedLabel = document.getElementById('modal-category').value.trim();
    const subSelect = document.getElementById('modal-subtype');
    const prioritySelect = document.getElementById('modal-priority');
    const metaContainer = document.getElementById('modal-dynamic-fields');
    
    const typeObj = (window.AppConfig && window.AppConfig.taskTypes) ? window.AppConfig.taskTypes.find(t => t.label === selectedLabel) : null;

    if (!typeObj) {
      subSelect.innerHTML = '<option value="">Select Subtype</option>';
      subSelect.disabled = true; subSelect.classList.add('bg-gray-100'); subSelect.classList.remove('bg-white');
      metaContainer.innerHTML = ''; metaContainer.classList.add('hidden');
      return;
    }

    if (typeObj.defaultPriority) prioritySelect.value = typeObj.defaultPriority;
    else prioritySelect.value = 'Medium';

    subSelect.innerHTML = '<option value="">Select Subtype</option>';
    if (typeObj.subTypes && typeObj.subTypes.length > 0) {
      subSelect.disabled = false; subSelect.classList.remove('bg-gray-100'); subSelect.classList.add('bg-white');
      typeObj.subTypes.forEach(sub => { subSelect.innerHTML += `<option value="${sub}">${sub}</option>`; });
    } else {
      subSelect.disabled = true; subSelect.classList.add('bg-gray-100'); subSelect.classList.remove('bg-white');
    }

    metaContainer.innerHTML = '';
    if (typeObj.metadata && typeObj.metadata.length > 0) {
      metaContainer.classList.remove('hidden');
      const titleEl = document.createElement('div');
      titleEl.className = 'text-[10px] font-black text-blue-600 uppercase tracking-widest mb-3 border-b border-blue-200 pb-2';
      titleEl.textContent = `${selectedLabel} Required Info`;
      metaContainer.appendChild(titleEl);

      typeObj.metadata.forEach(m => {
        let fieldHtml = `<div class="mb-3"><label class="block text-[11px] font-bold text-blue-900 mb-1.5">${m.name}</label>`;
        if (m.type === 'textarea') fieldHtml += `<textarea class="dynamic-meta-input w-full text-sm font-medium border border-blue-200 rounded-xl px-4 py-3 bg-white focus:border-blue-500 focus:outline-none resize-none shadow-sm" rows="2" data-label="${m.name}" placeholder="Enter ${m.name}..."></textarea>`;
        else if (m.type === 'select') {
          fieldHtml += `<select class="dynamic-meta-input w-full text-sm font-semibold border border-blue-200 rounded-xl px-4 py-2.5 bg-white focus:border-blue-500 focus:outline-none shadow-sm modern-select" data-label="${m.name}"><option value="">Select ${m.name}...</option>`;
          (m.options || []).forEach(opt => { fieldHtml += `<option value="${opt}">${opt}</option>`; });
          fieldHtml += `</select>`;
        } 
        else if (m.type === 'url') {
          fieldHtml += `<div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="h-4 w-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg></div><input type="url" class="dynamic-meta-input w-full text-sm font-medium border border-blue-200 rounded-xl pl-9 pr-3 py-2.5 bg-white focus:border-blue-500 focus:outline-none shadow-sm" data-label="${m.name}" placeholder="https://example.com"></div>`;
        }
        else fieldHtml += `<input type="${m.type || 'text'}" class="dynamic-meta-input w-full text-sm font-medium border border-blue-200 rounded-xl px-4 py-2.5 bg-white focus:border-blue-500 focus:outline-none shadow-sm" data-label="${m.name}" placeholder="Enter ${m.name}...">`;
        fieldHtml += `</div>`;
        metaContainer.insertAdjacentHTML('beforeend', fieldHtml);
      });
    } else metaContainer.classList.add('hidden');
  },

  createTaskPromise(payload) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .API_createTask(JSON.stringify(payload));
    });
  },

  async submit() {
    let title = document.getElementById('modal-title').value.trim();
    const category = document.getElementById('modal-category').value.trim();
    const typeObj = (window.AppConfig && window.AppConfig.taskTypes) ? window.AppConfig.taskTypes.find(t => t.label === category) : null;

    if (!category || !typeObj) {
      if (typeof toastError === "function") toastError("A valid Category selection is required.");
      return;
    }

    if (!title) {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      title = `${yyyy}_${mm}_${dd}_${category}`;
    }

    const btn = document.getElementById('modal-submit-btn');
    btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>`;
    btn.disabled = true;

    let metaObj = {};
    document.querySelectorAll('.dynamic-meta-input').forEach(input => {
      if(input.value.trim() !== '') {
        metaObj[input.dataset.label] = input.value.trim();
      }
    });

    let assignees = this.selectedAssignees.map(a => a.email);
    if (assignees.length === 0) assignees = [""]; 

    try {
      for (const email of assignees) {
        const payload = {
          title: title,
          taskType: category,
          subType: document.getElementById('modal-subtype').value,
          assignedTo: email,
          priority: document.getElementById('modal-priority').value,
          deadline: document.getElementById('modal-deadline').value, 
          description: document.getElementById('modal-desc').value.trim(), 
          metadata: JSON.stringify(metaObj) 
        };
        await this.createTaskPromise(payload);
      }
      
      if (typeof showToast === "function") showToast(assignees.length > 1 ? `Bulk created ${assignees.length} tasks!` : "Task created successfully!", "success");
      this.close();
      if (window.Dashboard) window.Dashboard.init();
      
    } catch (error) {
      if (typeof toastError === "function") toastError(error.message || "Failed to create task.");
    } finally {
      btn.innerHTML = 'Create Task'; 
      btn.disabled = false;
    }
  }
};

window.ViewTaskModal = {
  currentTask: null,
  currentComments: [],
  isEditingDesc: false,
  editableDescription: '', 
  slaInterval: null, 

  linkify(inputText) {
    if (!inputText) return '';
    let htmlText = inputText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
    htmlText = htmlText.replace(urlRegex, function(url) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-[10px] font-bold text-white bg-blue-600 hover:bg-blue-700 px-2 py-0.5 rounded shadow-sm transition-colors my-0.5 ml-1">
                Open Link <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
              </a>`;
    });
    return htmlText;
  },

  toggleEditDesc() {
    this.isEditingDesc = !this.isEditingDesc;
    const viewDiv = document.getElementById('vt-desc-view');
    const editArea = document.getElementById('vt-desc');
    const btn = document.getElementById('vt-desc-edit-btn');

    if (this.isEditingDesc) {
      viewDiv.classList.add('hidden');
      editArea.classList.remove('hidden');
      editArea.value = this.editableDescription; 
      btn.textContent = 'Preview';
      btn.classList.replace('text-blue-600', 'text-green-600');
      btn.classList.replace('bg-blue-50', 'bg-green-50');
      btn.classList.replace('hover:bg-blue-100', 'hover:bg-green-100');
    } else {
      editArea.classList.add('hidden');
      viewDiv.classList.remove('hidden');
      this.editableDescription = editArea.value; 
      viewDiv.innerHTML = this.linkify(this.editableDescription); 
      btn.textContent = 'Edit Text';
      btn.classList.replace('text-green-600', 'text-blue-600');
      btn.classList.replace('bg-green-50', 'bg-blue-50');
      btn.classList.replace('hover:bg-green-100', 'hover:bg-blue-100');
    }
  },

  open(taskId) {
    document.getElementById('view-task-modal').classList.remove('hidden');
    document.getElementById('vt-loading').classList.remove('hidden');
    document.getElementById('vt-content').classList.add('hidden');
    this.isEditingDesc = false; 
    
    if (this.slaInterval) clearInterval(this.slaInterval);

    setTimeout(() => {
      document.getElementById('view-task-modal-content').classList.remove('scale-95');
      document.getElementById('view-task-modal-content').classList.add('scale-100');
    }, 10);

    google.script.run
      .withSuccessHandler(responseJson => {
        const response = JSON.parse(responseJson);
        if (response.success) {
          this.currentTask = response.data.task;
          this.currentComments = response.data.comments || [];
          this.renderForm();
          this.renderActivityFeed(this.currentComments); 
          this.startSlaTimer();
        }
      })
      .withFailureHandler(err => {
        if (typeof toastError === "function") toastError('Failed to load task: ' + err.message);
        this.close();
      })
      .API_getTaskById(taskId);
  },

  close() {
    if (this.slaInterval) clearInterval(this.slaInterval);
    document.getElementById('view-task-modal-content').classList.remove('scale-100');
    document.getElementById('view-task-modal-content').classList.add('scale-95');
    setTimeout(() => {
      document.getElementById('view-task-modal').classList.add('hidden');
      this.currentTask = null;
      this.currentComments = [];
    }, 200);
  },

  startSlaTimer() {
    const task = this.currentTask;
    const slaBox = document.getElementById('vt-sla-box');
    const timerEl = document.getElementById('vt-sla-timer');
    
    if (this.slaInterval) clearInterval(this.slaInterval);

    const priority = (task.priority || '').toLowerCase();
    const slaHours = (window.AppConfig && window.AppConfig.timers && window.AppConfig.timers[priority]) ? window.AppConfig.timers[priority] : 0;

    if (!slaHours || task.status !== 'In-Progress') {
        slaBox.classList.add('hidden');
        return;
    }

    slaBox.classList.remove('hidden');

    let startTime = new Date(task.createdAt).getTime();
    const ipComments = this.currentComments.filter(c => c.message && c.message.includes('to **In-Progress**'));
    
    if (ipComments.length > 0) {
        ipComments.sort((a,b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        startTime = new Date(ipComments[0].createdAt).getTime();
    }

    const expireTime = startTime + (slaHours * 60 * 60 * 1000);

    const updateTimer = () => {
        const now = new Date().getTime();
        const diff = expireTime - now;

        if (diff <= 0) {
            timerEl.textContent = 'OVERDUE';
            timerEl.className = 'text-2xl font-black text-red-600 animate-pulse font-sans';
            clearInterval(this.slaInterval);

            const alreadyLogged = this.currentComments.some(c => c.message && c.message.includes('🚨 **SYSTEM ALERT:** SLA Overdue'));
            if (!alreadyLogged) {
                 this.postSystemOverdueLog(task.id);
                 if (typeof window.addNotification === "function") {
                    window.addNotification("SLA Overdue!", `Task "${task.title}" has breached its SLA limit.`, "overdue", task.id);
                 }
            }
            return;
        }

        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        timerEl.textContent = `${h}h ${m}m ${s}s`;
        if (h < 1) timerEl.className = 'text-xl font-black text-orange-500 font-mono tracking-tight animate-pulse';
        else timerEl.className = 'text-xl font-black text-green-600 font-mono tracking-tight';
    };

    updateTimer();
    this.slaInterval = setInterval(updateTimer, 1000);
  },

  postSystemOverdueLog(taskId) {
      const payload = {
        taskId: taskId,
        message: `🚨 **SYSTEM ALERT:** SLA Overdue limit reached.`
      };

      google.script.run
        .withSuccessHandler(() => {
            this.currentComments.push({
                message: payload.message,
                createdAt: new Date().toISOString(),
                user: window.CurrentUser ? window.CurrentUser.email : 'System'
            });
            this.renderActivityFeed(this.currentComments);
        })
        .API_addComment(JSON.stringify(payload));
  },

          (m.options || []).forEach(opt => {
            const selected = (opt === val) ? 'selected' : '';
            fieldHtml += `<option value="${opt}" ${selected}>${opt}</option>`;
          });

          fieldHtml += `<div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="h-4 w-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg></div><input type="url" value="${val}" class="vt-dynamic-meta-input w-full text-sm font-medium border border-indigo-200 rounded-xl pl-9 pr-3 py-2.5 bg-white focus:border-indigo-500 focus:outline-none shadow-sm transition-colors" data-label="${m.name}"></div>`;

  renderActivityFeed(comments) {
    const list = document.getElementById('vt-activity-list');
    list.innerHTML = '';
    let activities = [];

    if (comments && comments.length > 0) {
      comments.forEach(c => {
        const isSystem = c.user && c.user.startsWith('System|');
        let displayUser = c.user ? c.user.split('@')[0] : 'Unknown';
        if (isSystem) {
          const parts = c.user.split('|');
          displayUser = parts[1] ? parts[1].split('@')[0] : 'System';
        }
        activities.push({
          type: isSystem ? 'system' : 'comment',
          user: displayUser,
          text: c.message,
          date: new Date(c.createdAt || new Date())
        });
      });
    }

    activities.sort((a, b) => a.date - b.date);

    if (activities.length === 0) {
      list.innerHTML = '<div class="text-sm text-gray-400 italic text-center py-4">No activity recorded yet.</div>';
      return;
    }

    let previousTime = this.currentTask.createdAt ? new Date(this.currentTask.createdAt).getTime() : null;

    activities.forEach(act => {
      const actTime = act.date.getTime();
      let timeSpentStr = '';

      if (previousTime) {
         const diffMs = actTime - previousTime;
         const diffHrs = Math.floor(diffMs / 3600000);
         const diffMins = Math.floor((diffMs % 3600000) / 60000);
         if (diffHrs > 0) timeSpentStr = `${diffHrs}h ${diffMins}m`;
         else if (diffMins > 0) timeSpentStr = `${diffMins}m`;
         else timeSpentStr = `< 1m`;
      } else {
         timeSpentStr = `Start`;
      }

      previousTime = actTime; 

      const div = document.createElement('div');
      const timeStr = act.date.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
      const isAlert = act.text.includes('🚨 **SYSTEM ALERT:**');

      if (act.type === 'system') {
        div.className = `flex items-start gap-3 text-xs py-2 border-l-2 pl-4 ml-3 my-2 bg-white rounded-r-lg shadow-sm ${isAlert ? 'border-red-400 text-red-600' : 'border-blue-200 text-gray-500'}`;
        div.innerHTML = `
          <svg class="w-4 h-4 ${isAlert ? 'text-red-500' : 'text-blue-400'} flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${isAlert ? 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' : 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z'}"></path></svg>
          <div class="flex-1 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-1">
            <div><span class="font-bold ${isAlert ? 'text-red-700' : 'text-gray-700'}">${act.user}</span> <span>${this.linkify(act.text)}</span></div>
            <div class="flex items-center gap-2">
              <span class="text-[9px] text-gray-400 font-bold bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100 shadow-sm flex items-center gap-1" title="Time elapsed since previous activity">
                 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${timeSpentStr}
              </span>
              <span class="text-[10px] text-gray-400 whitespace-nowrap">${timeStr}</span>
            </div>
          </div>
        `;
      } else {
        div.className = `bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-sm my-3 ${isAlert ? 'border-red-200 bg-red-50/30' : ''}`;
        div.innerHTML = `
          <div class="flex justify-between items-baseline mb-2">
            <span class="font-black ${isAlert ? 'text-red-700' : 'text-blue-700'} text-xs">${act.user}</span>
            <div class="flex items-center gap-2">
              <span class="text-[9px] text-gray-400 font-bold bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100 shadow-sm flex items-center gap-1" title="Time elapsed since previous activity">
                 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${timeSpentStr}
              </span>
              <span class="text-[10px] text-gray-400 font-mono font-medium">${timeStr}</span>
            </div>
          </div>
          <div class="${isAlert ? 'text-red-800' : 'text-gray-700'} whitespace-pre-wrap font-medium">${this.linkify(act.text)}</div>
        `;
      }
      list.appendChild(div);
    });
    
    list.scrollTop = list.scrollHeight;
  },

  postComment() {
    const msgInput = document.getElementById('vt-new-comment');
    const msg = msgInput.value.trim();
    if (!msg) return;

    const btn = document.getElementById('btn-post-comment');
    btn.disabled = true;
    btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>`;

    const payload = {
      taskId: this.currentTask.id,
      message: msg
    };

    google.script.run
      .withSuccessHandler(responseJson => {
        msgInput.value = '';
        btn.disabled = false;
        btn.textContent = 'Post Update';
        this.open(this.currentTask.id);
      })
      .withFailureHandler(err => {
        if (typeof toastError === "function") toastError('Failed to post comment: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Post Update';
      })
      .API_addComment(JSON.stringify(payload));
  },

  updateStatusDropdown(taskType, currentStatus) {
    const statusSelect = document.getElementById('vt-status');
    statusSelect.innerHTML = '';
    
    const typeObj = window.AppConfig.taskTypes.find(t => t.label === taskType);
    let allowedStatuses = ['Open', 'In-Progress', 'Completed']; 
    
    if (typeObj && typeObj.statuses && typeObj.statuses.length > 0) {
      allowedStatuses = [...typeObj.statuses]; 
    }

    if (!allowedStatuses.includes(currentStatus) && currentStatus) allowedStatuses.push(currentStatus);
    
    allowedStatuses.forEach(statusOpt => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = statusOpt;
      if (currentStatus === statusOpt) opt.selected = true;
      statusSelect.appendChild(opt);
    });
  },

  updateSubTypes(currentSubType = null) {
    const typeSelect = document.getElementById('vt-type');
    const subTypeSelect = document.getElementById('vt-sub-type');
    const wrapper = document.getElementById('vt-subtype-wrapper');
    const selectedType = typeSelect.value;
    subTypeSelect.innerHTML = ''; 
    
    const typeObj = window.AppConfig.taskTypes.find(t => t.label === selectedType);
    const availableSubTypes = (typeObj && typeObj.subTypes) ? typeObj.subTypes : [];

    if (availableSubTypes.length === 0) {
      subTypeSelect.innerHTML = '<option value="N/A">N/A</option>';
      wrapper.classList.add('hidden');
      return;
    }
    
    wrapper.classList.remove('hidden');
    availableSubTypes.forEach(sub => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = sub;
      if (currentSubType === sub) opt.selected = true;
      subTypeSelect.appendChild(opt);
    });
    
    if(!currentSubType) { 
      this.updateStatusDropdown(selectedType, this.currentTask.status);
    }
  },

  submit(event) {
    event.preventDefault(); 
    
    const currentDesc = this.isEditingDesc 
      ? document.getElementById('vt-desc').value 
      : this.editableDescription;
      
    const btn = document.getElementById('btn-save-task');
    btn.disabled = true; 
    btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></div> Saving...`;
    
    let metaObj = {};
    document.querySelectorAll('.vt-dynamic-meta-input').forEach(input => {
      if(input.value.trim() !== '') {
        metaObj[input.dataset.label] = input.value.trim();
      }
    });
    
    const payload = {
      id: document.getElementById('vt-id').value,
      title: document.getElementById('vt-title').value,
      description: currentDesc.trim(),
      taskType: document.getElementById('vt-type').value,
      subType: document.getElementById('vt-sub-type').value,
      status: document.getElementById('vt-status').value,
      priority: document.getElementById('vt-priority').value,
      assignedTo: document.getElementById('vt-assigned').value,
      deadline: document.getElementById('vt-deadline').value,
      metadata: JSON.stringify(metaObj) 
    };

    google.script.run
      .withSuccessHandler(responseJson => {
        if (typeof showToast === "function") showToast('Task updated!', 'success');
        this.close();
        if (window.Dashboard) window.Dashboard.init();
        this.resetButton(btn);
      })
      .withFailureHandler(err => {
        if (typeof toastError === "function") toastError('Failed to update task: ' + err.message);
        this.resetButton(btn);
      })
      .API_updateTask(JSON.stringify(payload));
  },

  deleteTask() {
    if (!confirm("Are you sure you want to delete this task?")) return;
    const taskId = document.getElementById('vt-id').value;
    const btn = document.getElementById('btn-delete-task');
    btn.disabled = true; 
    btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-red-500 mr-2"></div> Deleting...`;
    
    google.script.run
      .withSuccessHandler(responseJson => {
        if (typeof showToast === "function") showToast('Task deleted.', 'success');
        
        // FIX: Reset the button state before closing the modal!
        btn.disabled = false;
        btn.textContent = 'Delete Task';
        
        this.close();
        if (window.Dashboard) window.Dashboard.init();
      })
      .withFailureHandler(err => {
        if (typeof toastError === "function") toastError('Failed to delete: ' + err.message);
        
        // Reset on failure too
        btn.disabled = false;
        btn.textContent = 'Delete Task';
      })
      .API_deleteTask(taskId);
  },

  resetButton(btn) {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
};
</script>
